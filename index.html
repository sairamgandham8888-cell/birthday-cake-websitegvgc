<script>
    // ---------- DOM elements ----------
    const flame = document.getElementById('flameElement');
    const candleStick = document.getElementById('candleStick');
    const micBtn = document.getElementById('micBtn');
    const micStatusSpan = document.getElementById('micStatus');
    const resetBtn = document.getElementById('resetBtn');
    const dobDisplaySpan = document.getElementById('dobDisplay');
    const ageDisplaySpan = document.getElementById('ageDisplay');
    const birthdayMsgDiv = document.getElementById('birthdayMsg');

    // ---------- Candle state ----------
    let isCandleLit = true;       // true = flame burning
    let mediaStream = null;
    let audioContext = null;
    let sourceNode = null;
    let analyserNode = null;
    let animationFrameId = null;
    let isMicActive = false;

    // ---------- Birthday configuration (edit here for your own birthday!) ----------
    // Set the birthday person's date of birth (YYYY, MM-1, DD) -> Month is 0-index in JS
    const BIRTHDAY_DATE = new Date(1995, 5, 15);  // Example: June 15, 1995  (month 5 = June)
    // You can change this to any date: new Date(YEAR, MONTH-1, DAY)
    // For a dynamic demo, we'll also store a display string

    function formatDateToYMD(date) {
        let year = date.getFullYear();
        let month = (date.getMonth() + 1).toString().padStart(2, '0');
        let day = date.getDate().toString().padStart(2, '0');
        return `${year}-${month}-${day}`;
    }

    // calculate exact age (years) based on birthday
    function calculateAge(birthDate) {
        const today = new Date();
        let age = today.getFullYear() - birthDate.getFullYear();
        const monthDiff = today.getMonth() - birthDate.getMonth();
        if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < birthDate.getDate())) {
            age--;
        }
        return age;
    }

    // update UI with birthday & age & custom message
    function updateBirthdayInfo() {
        const dobFormatted = formatDateToYMD(BIRTHDAY_DATE);
        dobDisplaySpan.textContent = dobFormatted;
        const age = calculateAge(BIRTHDAY_DATE);
        ageDisplaySpan.textContent = `${age} years old 🎂`;

        // special birthday message: if today matches birth month & day -> extra wishes
        const today = new Date();
        const isActualBirthday = (today.getMonth() === BIRTHDAY_DATE.getMonth() && today.getDate() === BIRTHDAY_DATE.getDate());
        let msg = "";
        if (isActualBirthday) {
            msg = `🎉 HAPPY BIRTHDAY! 🎉 You're ${age} today! 🥳🎂🎈`;
        } else {
            msg = `🎈 Celebrating you! Born on ${dobFormatted} · Age ${age} · Cheers! 🎁`;
        }
        if (!isCandleLit) {
            msg = `✨ WISH GRANTED! ✨ ${msg} 🕯️💨✨`;
        }
        birthdayMsgDiv.textContent = msg;

        if (!isCandleLit) return;

        // add class to flame to hide + add extinguish effect on candle stick
        flame.classList.add('extinguished');
        candleStick.classList.add('extinguished-candle');
        updateBirthdayInfo(); // update message to show candle blown
        // optional: play little visual puffs? just ui update
    }

    function relightCandle() {
        if (isCandleLit) return;
        isCandleLit = true;
        flame.classList.remove('extinguished');
        candleStick.classList.remove('extinguished-candle');
        updateBirthdayInfo();
    }

    // ---------- Audio Analysis for Blow Detection ----------
    // We detect high-energy broadband noise typical for blowing / shouting.
    // Thresholds: blow often creates high volume in mid-high frequencies & sharp RMS amplitude.
    let lastBlowTimestamp = 0;
    const BLOW_COOLDOWN_MS = 800;   // prevent multiple blows in quick succession
    const BLOW_ENERGY_THRESHOLD = 0.38;  // normalized RMS threshold (0-1), blow easily reaches >0.4 if shouting/blowing into mic

    function initAudioAndAnalyser() {
        if (audioContext && audioContext.state !== 'closed') {
            // already initialized but maybe suspended
            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }
            return;
        }
        try {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyserNode = audioContext.createAnalyser();
            analyserNode.fftSize = 256;
            analyserNode.smoothingTimeConstant = 0.2;
        } catch (e) {
            console.warn(e);
            micStatusSpan.innerText = "❌ WebAudio not supported";
            return false;
        }
        return true;
    }

    // start mic stream
    async function enableMicrophone() {
        if (mediaStream) {
            // already active, just ensure context is running
            if (audioContext && audioContext.state === 'suspended') {
                await audioContext.resume();
            }
            micStatusSpan.innerText = "🎙️ Active · Blow Now!";
            return true;
        }
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
            mediaStream = stream;

            if (!audioContext || audioContext.state === 'closed') {
                if (!initAudioAndAnalyser()) throw new Error("audio init fail");
            }
            await audioContext.resume();

            if (sourceNode) {
                try { sourceNode.disconnect(); } catch(e) {}
            }
            sourceNode = audioContext.createMediaStreamSource(stream);
            sourceNode.connect(analyserNode);
            // no need to connect to destination unless you want feedback
            micStatusSpan.innerText = "🎙️ Active · Blow Now!";
            isMicActive = true;
            startBlowDetectionLoop();
            return true;
        } catch (err) {
            console.error("Microphone error:", err);
            micStatusSpan.innerText = "❌ Mic blocked / error";
            isMicActive = false;
            return false;
        }
    }

    // stop mic and cleanup
    function stopMicrophone() {
        if (animationFrameId) {
            cancelAnimationFrame(animationFrameId);
            animationFrameId = null;
        }
        if (sourceNode) {
            try { sourceNode.disconnect(); } catch(e) {}
            sourceNode = null;
        }
        if (mediaStream) {
            mediaStream.getTracks().forEach(track => {
                track.stop();
            });
            mediaStream = null;
        }
        if (audioContext) {
            audioContext.close().catch(e=>console.warn);
            audioContext = null;
            analyserNode = null;
        }
        isMicActive = false;
        micStatusSpan.innerText = "⚪ Inactive";
    }

    // get current RMS volume from microphone (0...1)
    function getVolumeRMS() {
        if (!analyserNode) return 0;
        const dataArray = new Uint8Array(analyserNode.frequencyBinCount);
        analyserNode.getByteTimeDomainData(dataArray);
        let sumSquares = 0;
        for (let i = 0; i < dataArray.length; i++) {
            let v = (dataArray[i] - 128) / 128;
            sumSquares += v * v;
        }
        let rms = Math.sqrt(sumSquares / dataArray.length);
        // clamp to 0-1 range
        return Math.min(1.0, rms);
    }

    // detect blow: RMS high & also short burst detection
    function detectBlow() {
        if (!isMicActive || !analyserNode || !isCandleLit) return false;
        const rms = getVolumeRMS();
        // blow / shout creates rms > ~0.35 easily. adjust threshold
        if (rms > BLOW_ENERGY_THRESHOLD) {
            const now = Date.now();
            if (now - lastBlowTimestamp > BLOW_COOLDOWN_MS) {
                lastBlowTimestamp = now;
                return true;
            }
        }
        return false;
    }

    function startBlowDetectionLoop() {
        if (animationFrameId) cancelAnimationFrame(animationFrameId);

                return;

                        micStatusSpan.style.backgroundColor = "#2e241f";

                    let rms = getVolumeRMS();

                    } else if (rms > 0.05) {
                        micStatusSpan.innerText = `🎙️ Keep blowing...`;
                    } else {
                        micStatusSpan.innerText = `🎙️ Active · Blow Now!`;
                    }
                }
            } else {
                micStatusSpan.innerText = `🕯️ Candle is out! 🎉 Press reset`;
            }
            animationFrameId = requestAnimationFrame(loop);
        }
        loop();
    }

            }, 1200);
